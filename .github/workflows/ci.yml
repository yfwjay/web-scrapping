name: Python CI Pipeline

# Trigger this workflow on every push or pull request to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # Run the tests on a fresh cloud-hosted Ubuntu Linux runner
    runs-on: ubuntu-latest

    steps:
    # 1. Download your repository code onto the runner
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Set up the specific Python version for your ML models
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Cache dependencies so your builds run faster next time
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Check for syntax errors or broken code structure using Flake8
    - name: Lint Code with Flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
